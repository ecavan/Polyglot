[models]
# --- transcription ---
transcribe_backend = "mlx-whisper"                       # "mlx-whisper" | "faster-whisper"
mlx_whisper_repo   = "mlx-community/whisper-large-v3-turbo"
faster_whisper     = "medium.en"                          # used only by faster-whisper backend

# --- translation ---
translate_backend  = "mlx"                                # "mlx" | "ollama"
mlx_llm_repo       = "mlx-community/Qwen2.5-7B-Instruct-4bit"
ollama_model       = "mistral"                            # used only by ollama backend
ollama_url         = "http://localhost:11434/api/chat"

# --- tts ---
tts_backend        = "orpheus"                            # "orpheus" (expressive FR) | "xtts" | "piper"
tts_device         = "cpu"                                # XTTS on Apple Silicon: MUST be "cpu"

[tts]
# "pool" = built-in voice_pool (reliable); "self" = clone each speaker from the episode
# (only clones speakers with >=8s clean audio, else falls back to the pool).
voice_mode         = "pool"
# XTTS inference params (lower-level; tts.tts() ignores these). Cloned voices ramble above
# ~0.75; expressivity comes from the cloned voice itself, so keep sampling stable.
temperature        = 0.75
repetition_penalty = 6.0
top_p              = 0.85
length_penalty     = 1.0
speed              = 1.05        # post-synthesis pitch-preserving speed-up (gentle; ~natural pace)
# Voices assigned to detected speakers (round-robin). Chosen by audition:
# two distinct males (Viktor Eka, Andrew Chipper) for the two hosts, plus alternates.
voice_pool         = ["Viktor Eka", "Andrew Chipper", "Craig Gutsy", "Damien Black"]

[orpheus]
# Expressive French TTS (canopylabs/lex-au Orpheus 3B, GGUF via llama.cpp + SNAC).
# gguf defaults to ~/.cache/polyglot/orpheus/Orpheus-3b-French-FT-Q8_0.gguf
voices      = ["Pierre", "Amelie", "Marie"]   # Pierre=male, Amelie/Marie=female (French)
temperature = 0.7                              # higher => more expressive (0.6 base; >~0.8 risks instability)
max_tokens  = 1800

[separation]
# Demucs: split the episode into clean speech (for transcription/diarization) + a
# music/SFX bed that gets mixed back under the French dub.
enabled = true
device  = "cpu"        # Demucs has no MPS support on Apple Silicon; CPU only
segment = 7            # chunk length (s); htdemucs Transformer max is 7.8

[mix]
bed      = true        # mix the music/SFX bed under the dubbed speech
bed_gain = 0.6         # bed level under speech (prominent)

[paths]
cache   = "cache"
output  = "output"
voices  = "voices"
prompts = "config/prompts"
state   = "state/processed.json"

[hosting]
type            = "r2"                                    # "r2" | "local"
public_base_url = "https://media.example.com"             # r2.dev domain or custom CNAME
bucket          = "polyglot-media"
# credentials come from env vars, never this file:
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY

[library]
# Jellyfin watches Videos/ and Podcasts/ under this folder. Dubbed files + bilingual
# .srt land here; point Jellyfin's libraries at <path>/Videos and <path>/Podcasts.
path = "~/PolyglotLibrary"

[retention]
keep         = 10    # max dubbed items kept per source
max_age_days = 7     # also purge anything older than this (weekly window)

[defaults]
clip_seconds      = 0        # 0 = full episode; >0 = trim (handy for testing)
max_video_minutes = 60       # skip YouTube videos longer than this (sweet spot ~15-30 min)
diarize           = true     # label speakers -> assign distinct voices
num_speakers      = 3        # expected speakers: PTI = opening ad + 2 hosts (1 = solo; 0 = auto)
diarize_threshold = 0.5      # cosine distance for auto-detect mode (num_speakers = 0 only)
temperature       = 0.3      # translation sampler temp (0.0 = greedy/deterministic)
max_tokens        = 512      # per-segment translation cap
gap_ms            = 200      # silence inserted between synthesized segments
