[[show]]
id          = "pti-fr"
title       = "PTI (Français)"
source      = "https://feeds.megaphone.fm/ESP7239282233"   # PTI (ESPN) — verified 2026-06-14
source_type = "rss"
target_lang = "fr"
# voice omitted for Phase 1 -> built-in XTTS speaker. Add `voice = "fr_montreal"` once you
# have a reference clip (see docs/setup/setup-notes.md).
enabled     = true

# YouTube source: `watch` dubs new videos (<= max_video_minutes) into the Jellyfin
# library. enabled=false by default — flip to true when you're ready (each new video
# is a full dub and takes a while).
[[show]]
id          = "gotham-fr"
title       = "GothamChess (Français)"
source      = "https://www.youtube.com/@GothamChess/videos"
source_type = "youtube"
target_lang = "fr"
enabled     = false

